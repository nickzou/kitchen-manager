services:
  app:
    image: ghcr.io/${GITHUB_USERNAME:-nickzou}/kitchen-manager:latest
    container_name: kitchen-manager-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kitchen_manager}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kitchen-manager

  db:
    image: postgres:17-alpine
    container_name: kitchen-manager-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-kitchen_manager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kitchen-manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  kitchen-manager:
    driver: bridge
